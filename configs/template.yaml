DATA_SOURCE:
  dataset: "<dataset_name>"
  input_root: "<dataset_raw_data_root>"

output_root: "<dataset_mapper_data_root>"

s01_data:
  io:
    max_workers: 1
    chunk_len: 8192

s02_preprocessing:
  io: {}
  meta_contract: {}
  unit_contract: {}
  processes:
    - module: align_clean
      config_name: align_clean
    - module: unit_selection
      config_name: unit_select
    - module: smoothing_filtering
      config_name: rolling_mean
      trainer:
        enabled: true
        config_name: rolling_trainer
    - module: flagging
      config_name: flags_basic
    - module: feature_handler
      config_name: feature_handler
    - module: static_encode
      config_name: static_basic

s03_embedding: {}
s04_similarity: {}
s05_gnn: {}
s07_surrogates: {}

exec:
  reporting:
    console: true
    progress: true
    progress_style: single_line
    progress_every: 10
    progress_min_seconds: 1.0
    show_eta: true
