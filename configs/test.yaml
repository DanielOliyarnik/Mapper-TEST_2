DATA_SOURCE:
  dataset: dryad_blg59
  input_root: /home/daniel/Mapper-Design/mapper-runpod/mapper-data-root/DRYAD_BLG59/raw-data

output_root: /home/daniel/Mapper-Design/mapper-runpod/mapper-data-root/DRYAD_BLG59/mapper-data

s01_data:
  io:
    max_workers: 1
    chunk_len: 8192

s02_preprocessing:
  io: {}
  meta_contract: {}
  unit_contract: {}
  processes:
    - module: align_clean
      config_name: align_clean
    - module: unit_selection
      config_name: unit_select
    - module: smoothing_filtering
      config_name: rolling_mean
      trainer:
        enabled: true
        config_name: rolling_trainer
    - module: flagging
      config_name: flags_basic
    - module: features_constructor
      config_name: features_constructor
      trainer:
        enabled: true
        config_name: features_trainer
    - module: static_encode
      config_name: static_basic

exec:
  reporting:
    console: true
    progress: true
    progress_style: single_line
    progress_every: 10
    progress_min_seconds: 1.0
    show_eta: true
